<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://use.typekit.net/rgm1dlw.css" />
    <title>SVG Animation | Alignment Button</title>
  </head>
  <body>
    <div class="container">
      <button>
        <svg
          width="96"
          viewBox="0 0 100 100"
          fill="none"
          stroke="currentColor"
          stroke-width="5"
          stroke-linecap="round"
          xmlns="http://www.w3.org/2000/svg">
          <rect x="25" y="29" width="15" height="15" fill="none" rx="5" />
          <line x1="50" y1="29" x2="75" y2="29" />
          <line x1="50" y1="43" x2="75" y2="43" />
          <line x1 ="25" y1="56" x2="75" y2="56" />
          <line x1="25" y1="69" x2="75" y2="69" />
        </svg>
      </button>
      <p>Hover me!</p>
    </div>
  </body>
</html>
